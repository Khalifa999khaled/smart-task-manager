<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير المهام الاحترافي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>قائمة مهامي 📝</h1>
            <button id="themeToggle" class="theme-btn" title="تغيير الوضع">🌙</button>
        </header>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="ماذا تنوي فعله اليوم؟">
            <button id="addBtn">إضافة</button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="completed">المكتملة</button>
            <button class="filter-btn" data-filter="pending">قيد التنفيذ</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
